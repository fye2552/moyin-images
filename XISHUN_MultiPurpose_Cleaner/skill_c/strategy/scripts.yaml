scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Greasy kitchen surfaces resist ordinary cleaning—stovetop splatters, range hood oil buildup, oven grease baked on over time."
    conflict_hook: "Manual scrubbing with ineffective tools—sponge smearing, paper towel shredding, damp cloth just spreading the grease."
    product_solution: "XISHUN multi-purpose degreaser spray dissolves tough kitchen grease on contact with a simple spray-and-wipe action."
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Hand scrubbing greasy stovetop with plain sponge, close-up of yellow-brown residue smearing, person frustrated."
      - time: "3-6s"
        purpose: "产品解决"
        scene: "XISHUN spray bottle enters, quick spray onto greasy area, foam activates, grease visibly dissolving."
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Stovetop after one wipe—spotless and gleaming, burner grate clean, product beside the result."
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Spraying inside greasy oven—foam on baked-on spots, wipe reveals clean oven wall, different angle and environment."
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Range hood filter fully clean—metal mesh restored, no oil, air flowing. Product on counter nearby."
      - time: "18-20s"
        purpose: "CTA"
        scene: "Clean bright kitchen, XISHUN bottle centered, text overlay: 'Make your kitchen effortlessly clean.'"
    cta: "Make your kitchen effortlessly clean."
    dedupe_key: "XISHUN_MultiPurpose_Cleaner_script_c_001_kitchen_grease_stovetop_oven_rangehood"
