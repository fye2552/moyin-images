pain_points:
  - pain_point_id: "pain_001"
    pain_point: "Greasy stovetop splatters harden into stubborn residue that won't wipe off with a damp cloth alone."
    wrong_behavior: "Scrubbing the same spot over and over with a dish sponge, arm aching, grease barely budging."
    close_up_detail: "Close-up of a greasy stovetop edge with dried splatter rings—yellowish-brown residue caked around the burner."
    emotional_trigger: "Frustration and fatigue from wasted effort on a messy kitchen."
  - pain_point_id: "pain_002"
    pain_point: "Range hood filter clogged with sticky grease, reducing airflow and spreading cooking odors throughout the house."
    wrong_behavior: "Trying to wipe a greasy range hood mesh with a dry paper towel, grease just smearing instead of lifting."
    close_up_detail: "Fingers touching the greasy metal mesh of the range hood filter, leaving a clear fingerprint in thick yellow oil."
    emotional_trigger: "Disgust at touching built-up kitchen grease."
  - pain_point_id: "pain_003"
    pain_point: "Oven interior walls covered in baked-on grease splatters from months of roasting and broiling."
    wrong_behavior: "Spraying plain water onto oven walls and scrubbing with a scouring pad—ineffective, takes forever."
    close_up_detail: "Inside the oven, dark brown grease spots baked onto the back wall, splattered around the heating element."
    emotional_trigger: "Dread of the deep-clean chore that never gets easier."
