conflict_hooks:
  - conflict_id: "conflict_001"
    opening_scene: "A hand scrubs a greasy stovetop burner grate with a worn sponge. The grease smears but doesn't lift. The person sighs and pauses, hand trembling from effort."
    wrong_behavior: "Manual scrubbing with only water and a sponge—no degreaser, no results, just wasted time."
    amplified_detail: "Extreme close-up of the sponge edge dragging across a thick layer of yellow-brown grease, leaving a streaky smear behind."
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_002"
    opening_scene: "Fingers touch a range hood filter mesh and immediately recoil. The fingers are coated in sticky yellow oil. A paper towel is tried—it just shreds and sticks to the grease."
    wrong_behavior: "Attempting to clean a saturated grease filter with dry paper towels, making a bigger mess."
    amplified_detail: "The paper towel fragment stuck in the greasy mesh, oil visibly seeping through the thin paper."
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_003"
    opening_scene: "A kitchen sink basin is covered in a greasy film with food residue around the drain. A plain dishcloth is wiped across it—the grease just spreads thinly, leaving a shiny slick."
    wrong_behavior: "Wiping greasy sink surfaces with just a damp cloth, redistributing grease instead of removing it."
    amplified_detail: "The greasy sheen left behind on the stainless steel sink after the cloth passes over it, with visible drag marks."
    conflict_type: "real_life_wrong_behavior"
