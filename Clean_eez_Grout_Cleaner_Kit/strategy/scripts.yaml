scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Kneeling on hard floors scrubbing grout causes pain and still leaves grout dirty"
    conflict_hook: "Person on hands and knees, scrubbing grout with tiny brush, knees red, grout unchanged"
    product_solution: "Grout Cleaner Kit with stand-up brush instantly replaces kneeling, V-shaped brush cleans deep into grout lines while standing"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Person kneeling on kitchen tile, scrubbing grout with undersized brush, red knees, sweat, no progress on dark grout"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "Grout Cleaner Kit bottle and V-shaped stand-up brush on pole enter frame, person stands up, glides brush across grout line, grime lifts instantly"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Kitchen floor: clean bright grout line trails behind the V-shaped brush, person standing comfortably, brush head swiveling"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Bathroom: brush swivels around toilet base and tight corners, grout restores to light clean color, no kneeling needed"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Wide shot of fully restored tile floor with bright clean grout lines, person stands tall with product, fresh clean space"
      - time: "18-20s"
        purpose: "CTA"
        scene: "Product bottle and blue brush head centered, clean tile background, text overlay fades in"
    cta: "Clean grout standing up. Professional results at home."
    dedupe_key: "kneeling_grout_pain_standup_brush_solution_kitchen_bathroom"
