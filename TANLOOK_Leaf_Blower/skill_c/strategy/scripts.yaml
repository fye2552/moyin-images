scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Manual raking is exhausting and ineffective when wind blows leaves back."
    conflict_hook: "Tired homeowner raking endlessly on a driveway, leaves scattering in the wind."
    product_solution: "TANLOOK cordless leaf blower instantly replaces the rake, powerful 580 CFM airflow clears the entire driveway in seconds."
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Raking leaves on a driveway at sunset, wind blowing leaves back across cleared area, close-up of aching hands."
      - time: "3-6s"
        purpose: "产品解决"
        scene: "TANLOOK blower picked up, trigger pressed, powerful airflow pushes all leaves away instantly."
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Clean driveway, blower in hand, leaves gone, immediate before-and-after contrast."
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Winter morning: clearing light snow off car windshield with the blower, winter coat, snow blowing away."
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Summer: drying water from car surface after washing, demonstrating multi-season use."
      - time: "18-20s"
        purpose: "CTA"
        scene: "TANLOOK blower on screen, 'Your yard. Your power. Check it out today.'"
    cta: "Your yard. Your power. Check it out today."
    dedupe_key: "leaf_blower_raking_pain_manual_yard_work"
