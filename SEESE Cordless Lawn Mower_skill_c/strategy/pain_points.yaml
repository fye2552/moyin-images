pain_points:
  - pain_point_id: "pain_001"
    pain_point: "Corded electric mowers limit reach and create trip hazards, forcing constant outlet switching"
    wrong_behavior: "User drags a tangled orange extension cord across the lawn, stops to unplug and replug at a new outlet"
    close_up_detail: "Cord snagged on a garden rock, user's frustrated hand yanking it free"
    emotional_trigger: "frustration with restricted movement and constant interruptions"
  - pain_point_id: "pain_002"
    pain_point: "Gas mowers are heavy, loud, and require fuel mixing and pull-start struggles"
    wrong_behavior: "User strains to pull the starter cord repeatedly on a gas mower, wipes sweat from forehead"
    close_up_detail: "Sweat dripping, shaking arms after failed pull starts"
    emotional_trigger: "physical exhaustion and dread of lawn care day"
  - pain_point_id: "pain_003"
    pain_point: "Switching between separate mower, trimmer, and edger tools wastes time and storage space"
    wrong_behavior: "User finishes mowing, puts mower away, walks back to shed to grab a separate string trimmer"
    close_up_detail: "Three different tools cluttering a small shed, user fumbling between them"
    emotional_trigger: "inefficiency and clutter frustration"
  - pain_point_id: "pain_004"
    pain_point: "Single-battery tools die mid-job, leaving half the lawn unfinished"
    wrong_behavior: "Trimmer slows to a stop mid-trim, user checks battery, sighs in defeat"
    close_up_detail: "Dead battery indicator blinking, half-trimmed lawn edge visible"
    emotional_trigger: "disappointment and incomplete work"
  - pain_point_id: "pain_005"
    pain_point: "Hard-to-reach edges and corners get overgrown because mowers can't access them"
    wrong_behavior: "User bends down with hand shears trying to cut grass along a fence line"
    close_up_detail: "Overgrown grass against fence, user's strained hand gripping small shears"
    emotional_trigger: "physical discomfort and frustration with inaccessible areas"
