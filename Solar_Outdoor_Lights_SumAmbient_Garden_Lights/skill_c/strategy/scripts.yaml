scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Dark outdoor spaces at night are dangerous, inconvenient, and unwelcoming without proper lighting"
    conflict_hook: "Person stumbles through pitch-black garden, foot catches on stone, nearly falls in complete darkness"
    product_solution: "Solar outdoor pathway lights with square black solar cap and clear ribbed lantern shade push easily into soil, auto-activate at dusk, provide bright warm and cool white illumination instantly"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Person steps out into pitch-black garden, foot catches on stone edge, stumbles forward, hands outstretched, startled expression, complete darkness"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "Solar outdoor lights pushed into soil along pathway, black square solar cap and ribbed clear lantern shade visible, lights activate automatically as dusk falls, warm white glow instantly illuminates the pathway clearly"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Garden pathway: row of solar lights lining a garden path, warm white glow defining the walkway, plants and flowers gently lit, safe clear passage"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Patio or driveway edge: lights placed along stone patio border, cool white lighting creates crisp border definition, inviting outdoor space"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Wide garden night shot: entire pathway illuminated with warm and cool light combination, garden looks beautiful and welcoming, lights integrated naturally into landscape"
      - time: "18-20s"
        purpose: "CTA"
        scene: "Close-up of solar light: black square solar cap and clear ribbed lantern shade centered, warm white glow, text overlay fades in"
    cta: "Light up every step. Your garden after dark, beautifully."
    dedupe_key: "dark_garden_stumble_solar_pathway_lights_warm_cool_auto_dusk"
