scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Greasy stovetop with burnt-on residue impossible to clean with just a damp cloth"
    conflict_hook: "Wiping greasy stovetop with damp paper towel, smearing grease around instead of cleaning it"
    product_solution: "NUAN Heavy Duty Degreaser spray foam dissolves grease on contact — spray, wait, wipe for a completely clean surface"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Person wiping greasy stovetop with damp paper towel, grease smears into oily film, burnt spots remain"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "NUAN spray bottle enters, foam sprays onto grease, grease visibly dissolves and lifts"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Blue microfiber cloth wipes stovetop clean in one motion, reveals shiny surface, NUAN bottle nearby"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Range hood filter: spray foam onto greasy mesh, wipe reveals clean silver filter"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Wide shot sparkling clean kitchen with NUAN bottle and cloth displayed on counter"
      - time: "18-20s"
        purpose: "CTA"
        scene: "Text overlay 'NUAN Heavy Duty Degreaser. Make your space cleaner and cozier.' — product bottle center frame"
    cta: "Make your space cleaner and cozier."
    dedupe_key: "NUAN_Heavy_Duty_Degreaser_kitchen_grease_stovetop_range_hood_oven_foam_cleaner_peach_scent"
