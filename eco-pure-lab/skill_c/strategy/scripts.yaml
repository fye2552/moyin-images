scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "stubborn burnt-on grease on stovetop that won't lift with regular cleaning"
    conflict_hook: "close-up scrubbing of greasy burner with damp cloth, grease smearing, no progress"
    product_solution: "EcoPure Lab Heavy Duty Degreaser sprays foaming cleaner directly onto the burnt grease, white foam covers the dark grease and begins dissolving it instantly"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "close-up of greasy stovetop burner, hand scrubbing vigorously with a damp rag, grease smearing in circles, cloth turning dark brown-black, zero progress, person's hand pauses in frustration"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "EcoPure Lab white trigger spray bottle with orange label and navy footer enters from right, hand grips and sprays foaming cleaner directly onto the burnt grease ring, white foam expands and clings to the dark grease, foam visibly penetrating and lifting"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "fast cut to a clean gray microfiber cloth wiping across the stovetop, foam lifts away revealing a completely spotless stainless steel burner surface, metal gleaming under kitchen light, bottle standing nearby"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "fast cut to range hood filter scene, bottle sprays foam onto the greasy stainless filter mesh, white foam clings vertically, hand wipes with cloth to reveal clean shiny steel, bright daylight kitchen"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "fast cut to oven door glass with brown baked-on oil spots, foam sprayed across the surface, slow deliberate wipe reveals crystal clear glass reflecting a clean kitchen, final wide shot of the EcoPure Lab bottle on the counter"
      - time: "18-20s"
        purpose: "CTA"
        scene: "EcoPure Lab bottle centered on clean counter with subtle light reflection, white elegant text overlay fading in: 'Make your kitchen effortlessly clean.'"
    cta: "Make your kitchen effortlessly clean."
    dedupe_key: "eco_degreaser_stovetop_rangehood_oven_foam_clean"
