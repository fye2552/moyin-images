conflict_hooks:
  - conflict_id: "conflict_001"
    opening_scene: "close-up of a greasy stovetop burner, hand scrubbing vigorously with a damp rag, grease just smearing in circles without lifting"
    wrong_behavior: "scrubbing burnt grease with a plain wet cloth and weak cleaner, working harder but seeing zero progress"
    amplified_detail: "the cloth turns dark brown-black, but the grease ring on the burner stays exactly the same, the person's hand pauses in exhaustion"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_002"
    opening_scene: "person standing in kitchen holding a dripping greasy range hood filter, looking at it with disgust, water and grease dripping from fingers onto the stovetop"
    wrong_behavior: "trying to hand-wash the range hood filter with dish soap and a sponge, grease just redistributing into a sticky film instead of coming off"
    amplified_detail: "the sponge glides over the greasy surface without gripping, brown-yellow grease streaks remain, water beads up on the oily mesh"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_003"
    opening_scene: "close-up of an oven door, brown baked-on oil splatters visible through the glass, hand reaches in with a paper towel that immediately shreds on contact with greasy surface"
    wrong_behavior: "using a flimsy all-purpose spray and paper towels on oven glass, leaving behind lint, streaks, and untouched grease spots"
    amplified_detail: "paper towel fragments tear off and stick to greasy glass, the wiped area looks worse than before, person sighs in defeat"
    conflict_type: "real_life_wrong_behavior"
