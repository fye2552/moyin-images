pain_points:
  - pain_point_id: "pain_001"
    pain_point: "stubborn burnt-on grease on stovetop won't budge with regular spray"
    wrong_behavior: "scrubbing the same greasy burner spot repeatedly with a damp cloth and generic cleaner, leaving smeared residue"
    close_up_detail: "brown-black burnt grease ring around stove burner, cloth turning dark with smeared oil streaks, fingers getting sticky"
    emotional_trigger: "frustration and giving up, accepting a perpetually greasy stovetop as normal"
  - pain_point_id: "pain_002"
    pain_point: "range hood filter caked with sticky yellow cooking grease, impossible to wipe clean"
    wrong_behavior: "removing the greasy filter, running it under hot water, rubbing it with a sponge that just spreads the grease around"
    close_up_detail: "thick amber-yellow grease layer on stainless filter mesh, water beading on greasy surface, sponge sliding without cleaning"
    emotional_trigger: "disgust and helplessness, knowing the grease is building up but nothing works"
  - pain_point_id: "pain_003"
    pain_point: "oven door glass covered in baked-on oil splatter that turns brown with every use"
    wrong_behavior: "spraying a weak all-purpose cleaner on cold oven glass, wiping hard with paper towels that shred and leave lint on grease"
    close_up_detail: "darkened brown oil spots on oven glass, torn paper towel fragments stuck to greasy surface, streaks reflecting kitchen light"
    emotional_trigger: "embarrassment when guests see the greasy oven door, feeling like the kitchen is never truly clean"
