conflict_hooks:
  - conflict_id: "conflict_001"
    opening_scene: "A cardboard box stuffed with heavy books sits on a living room floor. A person lifts it, and the bottom instantly rips open"
    wrong_behavior: "Using weak cardboard boxes for heavy moving loads"
    amplified_detail: "Slow-motion close-up of the box bottom seam tearing, books and clothes cascading onto the floor in a messy pile"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_002"
    opening_scene: "A person struggles up stairs carrying multiple overloaded plastic shopping bags by their thin handles"
    wrong_behavior: "Relying on flimsy single-use plastic bags for carrying heavy or bulky items"
    amplified_detail: "Extreme close-up of a plastic handle stretching, whitening, then snapping — items tumble down the stairs"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_003"
    opening_scene: "A closet door opens to reveal a chaotic mess of blankets, seasonal clothes, and random items piled haphazardly"
    wrong_behavior: "Storing everything loosely with no labeling, no sorting, no system"
    amplified_detail: "Close-up of hands digging desperately through the pile, pulling out the wrong items repeatedly, frustration growing"
    conflict_type: "real_life_wrong_behavior"
