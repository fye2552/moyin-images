pain_points:
  - pain_point_id: "pain_001"
    pain_point: "Cardboard moving boxes rip under weight, collapse mid-carry, and take up floor space when not in use"
    wrong_behavior: "Stacking overstuffed cardboard boxes that tear at the bottom, struggling to carry multiple loose items in arms"
    close_up_detail: "Torn cardboard edge, items spilling out, person straining with awkward grip on flimsy box"
    emotional_trigger: "Frustration and physical strain from unreliable packing and heavy lifting"
  - pain_point_id: "pain_002"
    pain_point: "Multiple trips back and forth because bags and boxes cannot hold enough at once"
    wrong_behavior: "Making 4-5 trips carrying small shopping bags or broken-down boxes, wasting time and energy"
    close_up_detail: "Pile of small torn bags, person looking exhausted, clock showing time passing"
    emotional_trigger: "Exhaustion from inefficiency, wishing one trip was enough"
  - pain_point_id: "pain_003"
    pain_point: "Messy storage with no waterproof protection — damp clothes or bedding after basement storage"
    wrong_behavior: "Storing clothes and bedding in non-waterproof fabric bags or open containers in damp areas"
    close_up_detail: "Water stain on fabric bag corner, moldy edge of stored item, drip of condensation"
    emotional_trigger: "Disappointment finding stored items ruined by moisture"
