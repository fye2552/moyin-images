pain_points:
  - pain_point_id: "pain_001"
    pain_point: "Cardboard boxes burst under heavy load during moving"
    wrong_behavior: "Overstuffing flimsy cardboard boxes with heavy books and clothes, watching them tear open at the bottom"
    close_up_detail: "Close-up of cardboard bottom seam splitting apart, books and folded clothes spilling onto the floor"
    emotional_trigger: "Frustration and helplessness when hard work literally falls apart"
  - pain_point_id: "pain_002"
    pain_point: "Flimsy plastic bags rip and leak, wasting time and damaging belongings"
    wrong_behavior: "Carrying overloaded thin plastic shopping bags, handles snapping mid-carry"
    close_up_detail: "Slow-motion handle snap, bag dropping, items rolling across the hallway floor"
    emotional_trigger: "Annoyance and regret for trusting weak bags with important items"
  - pain_point_id: "pain_003"
    pain_point: "Cluttered closets with no organization, impossible to find specific items"
    wrong_behavior: "Digging through messy piles of clothes and blankets, pulling everything out just to find one jacket"
    close_up_detail: "Hands frantically searching through a chaotic mound of mixed fabrics, nothing labeled or sorted"
    emotional_trigger: "Overwhelm and wasted time in daily life"
