scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "long-shaft grass trimmer is hard to control bare-handed, leading to fatigue and uneven cutting"
    conflict_hook: "user grips the bare metal shaft awkwardly, hunching forward, trimmer wobbling"
    product_solution: "aluminum auxiliary handle with ergonomic black grip and secure bracket clamp fixes onto the trimmer shaft instantly, giving the user a comfortable second handhold"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Backyard lawn. User picks up a long-shaft trimmer bare-handed. Grips the cold metal shaft awkwardly. Hunching forward. Trimmer head wobbles. Uneven cut line visible in the grass."
      - time: "3-6s"
        purpose: "产品解决"
        scene: "Close-up of the silver aluminum handle with black rubber grip being clamped onto the trimmer shaft using the gray metal bracket. User's hand finds the ergonomic grip. Posture straightens. Trimmer stays level."
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Close-up of the black grip in a relaxed hand, smooth trimming along a straight lawn edge. Clean, even cut line. Product clearly visible on the shaft."
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "New angle: user trimming around a fence corner or flower bed edge. The gray bracket clamp with six bolts is visible. Handle adjusted slightly for comfortable reach. Natural daylight."
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Wide shot of a neatly trimmed lawn. User walks along smoothly with the trimmer. Product central and visible. Relaxed, satisfied body language."
      - time: "18-20s"
        purpose: "CTA"
        scene: "Product shown on a clean surface. CTA text: 'Your garden, under control.'"
    cta: "Your garden, under control."
    dedupe_key: "grass_trimmer_handle_pain_fatigue_control_bare_shaft_001"
