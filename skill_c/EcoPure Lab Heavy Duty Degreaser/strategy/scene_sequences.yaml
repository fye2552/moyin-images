    description: 'Fast cut: Wiping the foamed surface with a gray cloth, revealing a clean, shiny stainless stovetop underneath — the burnt ring completely gone'
  - time: 10-14s
    segment: fast_cut_scene_2
    description: 'Fast cut: Different scene — range hood being sprayed, white foam clinging to vertical stainless surface, then wiped away to reveal original shine, no streaks'
  - time: 14-18s
    segment: fast_cut_scene_3
    description: 'Fast cut: Final result — wide shot of a pristine kitchen, stovetop gleaming, range hood spotless, oven glass crystal clear, EcoPure Lab bottle standing proudly on the counter'
  - time: 18-20s
