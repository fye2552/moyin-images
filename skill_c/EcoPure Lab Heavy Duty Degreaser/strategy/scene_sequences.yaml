    segment: pain_conflict
    description: 'Real-life wrong cleaning behavior: damp rag smearing burnt grease around a stovetop burner, zero progress, visible frustration'
  - time: 3-6s
    segment: product_solution
    description: EcoPure Lab Heavy Duty Degreaser spray bottle enters frame, foam sprays onto the greasy surface, grease begins dissolving on contact, white foam turning brown as it lifts the oil
  - time: 6-10s
