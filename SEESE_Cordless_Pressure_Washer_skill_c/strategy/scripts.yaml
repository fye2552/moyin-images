    product_solution: "SEESE Cordless Pressure Washer appears from off-screen, connected to a simple bucket, delivering 1000 PSI on contact"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Close-up of sponge dragging muddy water across car hood, streaks visible, person's tired expression"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "SEESE Pressure Washer enters frame, powered on, high-pressure stream instantly cleans the same spot to a shine"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Foam pot attachment spraying thick foam over entire car, smooth sweeping motion, car gleaming"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Patio floor cleaning — nozzle rotates to wide fan spray, dirt blasting out of tile gaps, water clearing to reveal clean surface"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Garden watering — compact gun held one-handed, drawing from bucket, flowers sparkling with water droplets under sunlight"
      - time: "18-20s"
        purpose: "CTA"
        scene: "Product centered, lime green accents visible, text overlay: 'Power in your hands. Anywhere.'"
    cta: "Power in your hands. Anywhere."
    dedupe_key: "SEESE_Cordless_Pressure_Washer_manual_car_wash_pain_portable_solution_foam_patio_garden"
