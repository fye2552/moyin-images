pain_points:
  - pain_point_id: "pain_001"
    pain_point: "Hand washing a car takes forever and leaves streaks even after scrubbing"
    wrong_behavior: "Spending 40+ minutes hunched over with a sponge and bucket, arms aching, still seeing dirt in crevices"
    close_up_detail: "Close-up of a sponge dragging muddy water across a car hood, leaving dirty streaks behind"
    emotional_trigger: "Frustration and exhaustion from manual labor that doesn't even deliver a clean result"
  - pain_point_id: "pain_002"
    pain_point: "A regular garden hose has pitiful pressure that can't blast off caked-on patio grime"
    wrong_behavior: "Thumb over the hose end trying to create pressure, water splashing everywhere except where needed"
    close_up_detail: "Water trickling weakly from a hose onto moss-covered patio tiles, barely moving the dirt"
    emotional_trigger: "Feeling powerless against stubborn outdoor mess that just won't come off"
  - pain_point_id: "pain_003"
    pain_point: "Cleaning second-story windows or high gutters is dangerous and nearly impossible without professional gear"
    wrong_behavior: "Precariously balancing on a ladder with a wet rag stretched to reach, water dripping down the arm"
    close_up_detail: "Dirty window pane with dried water spots, a rag barely reaching the top corner from an unsafe angle"
    emotional_trigger: "Anxiety about safety combined with resignation that high areas will just stay dirty"
