conflict_hooks:
  - conflict_id: "conflict_001"
    opening_scene: "a homeowner on a sunny lawn struggling to push a rusty garden fork into hard compacted soil, foot slipping off repeatedly"
    wrong_behavior: "using a single-tine fork or a short hand aerator that barely penetrates the surface, requiring heavy force and awkward bending"
    amplified_detail: "close-up of the fork barely scratching the surface, dry soil crumbling, water beading on top without absorption"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_002"
    opening_scene: "a gardener stopping mid-task to furiously scrape caked mud and tangled grass clippings off the tines of a standard aerator, wasting seconds every few holes"
    wrong_behavior: "using a non-self-cleaning aerator where soil compacts between the spikes, requiring constant manual clearing"
    amplified_detail: "tight close-up of thick mud pressed into the spike plate, grass strands wrapping around the rods, hands prying the debris out"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_003"
    opening_scene: "a homeowner kneeling on the lawn pushing a short hand aerator into the ground one hole at a time, rubbing their lower back between pushes"
    wrong_behavior: "using a knee-level or ground-level aerator that forces the user into a bent-over or kneeling position for every single hole"
    amplified_detail: "close-up of strained hands gripping a short handle, knees pressing into uneven ground, slow progress across the yard"
    conflict_type: "real_life_wrong_behavior"
