pain_points:
  - pain_point_id: "pain_001"
    pain_point: "compacted lawn soil blocks water, oxygen, and nutrients from reaching grass roots"
    wrong_behavior: "struggling to push a dull garden fork or heavy metal rod into hard dry soil, bending over and straining"
    close_up_detail: "dry cracked soil surface, patchy yellow grass, water pooling and running off instead of soaking in"
    emotional_trigger: "frustration watching lawn deteriorate despite regular watering and fertilizing"
  - pain_point_id: "pain_002"
    pain_point: "manual aeration tools get clogged with mud and debris after every few holes"
    wrong_behavior: "constantly stopping to scrape caked-on mud and grass off the aerator tines, wasting time and effort"
    close_up_detail: "mud-packed spike plate with grass tangled around the rods, user banging the tool against the ground to clear it"
    emotional_trigger: "exhaustion from a task that should be simple turning into a messy chore"
  - pain_point_id: "pain_003"
    pain_point: "bent-over posture causes back strain and fatigue during lawn aeration"
    wrong_behavior: "kneeling or bending over with a short-handled aerator, pressing spikes in one by one with hands"
    close_up_detail: "user's strained posture, knees on hard ground, short tool barely reaching the soil"
    emotional_trigger: "dreading lawn maintenance knowing it will cause physical pain and take hours"
