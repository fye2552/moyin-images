pain_points:
  - pain_point_id: "pain_001"
    pain_point: "Greasy range hood filter dripping oil, impossible to wipe clean with just water and a rag"
    wrong_behavior: "Scrubbing a greasy range hood with a wet rag and dish soap, leaving smeared oil streaks everywhere"
    close_up_detail: "Close-up of yellow-brown oil residue caked onto the metal filter mesh, dripping onto the stovetop below"
    emotional_trigger: "Frustration from spending 10 minutes scrubbing with no visible result"
  - pain_point_id: "pain_002"
    pain_point: "Burnt oil stains on the gas stovetop that have baked on after cooking, requiring aggressive scraping"
    wrong_behavior: "Frantically scraping burnt grease rings around the burner with a metal scrubber, scratching the surface"
    close_up_detail: "Close-up of blackened, hardened oil rings around the burner, sponge disintegrating as person scrubs"
    emotional_trigger: "Annoyance at damaging the cooktop while trying to clean it"
  - pain_point_id: "pain_003"
    pain_point: "Kitchen countertop covered in sticky oil splatter after frying, surface feels greasy to the touch"
    wrong_behavior: "Wiping the counter with a dry paper towel that just spreads the grease around instead of removing it"
    close_up_detail: "Close-up of greasy fingerprint smears on a dark countertop, paper towel sliding over the surface"
    emotional_trigger: "Disgust at sticky kitchen surfaces even after supposed cleaning"
