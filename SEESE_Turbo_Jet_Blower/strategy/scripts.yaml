scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Exhausting manual leaf raking on a patio"
    conflict_hook: "Person battling wet leaves with a rake, tired and frustrated, leaves keep scattering back"
    product_solution: "SEESE Turbo Jet Blower appears, instantly clears the entire leaf pile with one powerful blast of air"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Backyard patio covered in wet autumn leaves. Person raking laboriously, wiping sweat, leaves scattering back. Close-up: tired hands, frustrated face."
      - time: "3-6s"
        purpose: "产品解决"
        scene: "SEESE Turbo Jet Blower enters frame. Person grabs it, presses the trigger. Instant powerful airflow clears the entire leaf pile cleanly off the stone tiles."
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Fast cut to clean patio result. Blower clearing remaining debris from edges and corners. Bright sunlight. Stone tiles perfectly clean."
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "New environment: driveway with a sedan. Blower nozzle close to mirror and door handle. Strong airflow instantly blows water beads off, leaving dry clean surface."
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Final result compilation. Garage corner dust-free, window track clean, patio furniture crevice spotless. Person holding blower one-handed, relaxed and satisfied."
      - time: "18-20s"
        purpose: "CTA"
        scene: "SEESE Turbo Jet Blower centered on a clean neutral background. Text overlay: 'Clean faster. Live easier.'"
    cta: "Clean faster. Live easier."
    dedupe_key: "manual_leaf_raking_turbo_blower_solution_autumn_patio_car_drying_garage"
