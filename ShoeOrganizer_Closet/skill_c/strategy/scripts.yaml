scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Shoes scattered across the floor creating messy entryway and tripping hazards"
    conflict_hook: "Front door entryway at the end of a busy day, person walks in and trips slightly on a scattered pile of shoes"
    product_solution: "The cream white fabric shoe organizer with clear lid and adjustable compartments instantly organizes shoes, protects from dust, and keeps the entryway clean"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Entryway floor covered with scattered shoes — multiple pairs tangled, dust visible, person nearly trips on the pile"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "Shoe organizer appears; hands quickly place shoes into adjustable compartments, close the clear zippered lid; instant organization"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Clean closet shelf with organized shoe box, clear lid showing shoes visible and protected, surrounding space tidy"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Bedroom — organizer on floor, person slides it under the bed using tan handles, space-saving versatility"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Wide shot of pristine entryway with organizer neatly by the door, shoes perfectly arranged, warm atmosphere"
      - time: "18-20s"
        purpose: "CTA"
        scene: "Text overlay: 'A simple upgrade for everyday organization.'"
    cta: "A simple upgrade for everyday organization."
    dedupe_key: "shoe_organizer_closet_entryway_messy_shoes_scattered_pile_organize"
