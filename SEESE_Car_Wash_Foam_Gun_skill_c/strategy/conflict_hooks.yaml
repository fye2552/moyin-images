conflict_hooks:
  - conflict_id: "conflict_001"
    opening_scene: "Sunlit driveway, person dipping sponge into murky gray bucket water, scrubbing a car door with thin watery suds streaking down the paint"
    wrong_behavior: "Using a bucket and sponge with weak soap, bending over repeatedly, water dripping everywhere"
    amplified_detail: "Close-up of dirty gray bucket water splashing, sponge squeezing out thin foam, hand wiping brow, streaky water spots on dark car panel"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_002"
    opening_scene: "Person holding a basic garden hose nozzle, squeezing trigger to blast water at dried mud and bug splatter on a car hood, water beading off without any cleaning action"
    wrong_behavior: "Spraying plain water onto stuck-on dirt with no foam, wiping with bare hand in frustration"
    amplified_detail: "Dried bug splatter on car surface not budging, water droplets rolling off dirt, nozzle trigger squeezed harder, muddy water dripping onto driveway"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_003"
    opening_scene: "Car sitting dusty and dirty in driveway, person looking at a car wash receipt in hand then looking at their watch, shaking head"
    wrong_behavior: "Skipping washing because car wash is too expensive or inconvenient, leaving car dirty"
    amplified_detail: "Crumpled car wash receipt, dust on hood visible in sunlight, person touching dirty car surface leaving a clean fingerprint spot"
    conflict_type: "real_life_wrong_behavior"
