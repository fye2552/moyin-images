scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Messy, slow bucket-and-sponge car washing that leaves streaks and water spots"
    conflict_hook: "Person struggling with a dirty bucket and sponge, thin suds streaking down the car door, visible frustration"
    product_solution: "SEESE foam gun connected to garden hose sprays thick white foam across the car, instantly covering the dirty surface with rich cleaning foam"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Driveway close-up: person dipping sponge into gray dirty bucket water, scrubbing car door with thin watery suds, hand wiping forehead, streaky water spots visible on dark paint"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "SEESE lime green and black foam gun enters frame connected to garden hose, clear soap cup with measurement marks visible, thick white foam sprays across car panel, dirty surface turning completely white with rich foam"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Fast cut to close-up of thick white foam clinging to car surface, SEESE foam gun in hand spraying even coverage across the hood, suds cascading down panels, white SEESE logo visible on black collar"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Fast cut to different angle: person using water spray mode, high-speed water stream rinsing foam off side panels, clean glossy paint revealed underneath, bright outdoor sunlight creating reflection"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Fast cut to wide driveway shot: sparkling clean dark car, person standing beside it holding the SEESE foam gun with a satisfied expression, garden hose visible, entire car gleaming"
      - time: "18-20s"
        purpose: "CTA"
        scene: "Text overlay on clean car background: 'Professional foam wash at home. SEESE.' Clean, minimal, no hard sell"
    cta: "Professional foam wash at home. SEESE."
    dedupe_key: "seese_foam_gun_bucket_sponge_pain_car_wash_driveway_foam_solution"
