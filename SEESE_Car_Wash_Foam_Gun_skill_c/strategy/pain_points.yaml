pain_points:
  - pain_point_id: "pain_001"
    pain_point: "Washing car by hand with bucket and sponge is slow, messy, and leaves water spots without proper foam coverage"
    wrong_behavior: "Person crouched beside car, dipping sponge into dirty bucket water, scrubbing panel by panel with thin suds dripping onto driveway"
    close_up_detail: "Dirty bucket water splashing, sponge dropping thin watery suds, hand wiping sweat from forehead, streaky water spots visible on car door"
    emotional_trigger: "Frustration at wasted time and poor results; longing for professional car-wash quality at home"
  - pain_point_id: "pain_002"
    pain_point: "Regular garden hose sprays water but cannot create thick cleaning foam, leaving road grime and bugs stuck to the car surface"
    wrong_behavior: "Person holding a basic garden hose nozzle, spraying water at dried mud and dead bugs on the hood, water beading off without cleaning"
    close_up_detail: "Water droplets on dirty car surface, dried bug splatter not budging, nozzle trigger being squeezed harder in frustration"
    emotional_trigger: "Annoyance that water alone isn't enough; desire for real cleaning power without a pressure washer"
  - pain_point_id: "pain_003"
    pain_point: "Spending money and time at commercial car washes, waiting in line, and still getting inconsistent results"
    wrong_behavior: "Car sitting dirty in driveway, person looking at watch, imagining the trip to the car wash"
    close_up_detail: "Wallet with crumpled receipts from car wash visits, car dusty and unwashed in driveway"
    emotional_trigger: "Feeling trapped between expensive car wash visits and ineffective home washing"
