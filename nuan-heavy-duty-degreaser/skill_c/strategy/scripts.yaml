scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Greasy stovetop that smears with plain water and rag"
    conflict_hook: "Cook wipes greasy stovetop, grease spreads into an even bigger mess"
    product_solution: "NUAN degreaser spray foam dissolves stovetop grease instantly, one wipe clean"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Cook finishes frying, grabs wet rag, wipes greasy stovetop, grease smears into shiny streaks, frustrated expression"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "NUAN white spray bottle with green label appears, trigger pressed, dense white foam covers greasy surface, grease starts dissolving on contact"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Single wipe with blue cloth, stovetop turns spotless black, product bottle beside clean surface, dramatic clean result"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "NUAN sprayed on greasy range hood filter, foam penetrating yellow grease, easy wipe reveals shiny metal filter"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Microwave interior sparkling clean, oven glass transparent, person gently touches clean surface with satisfied smile"
      - time: "18-20s"
        purpose: "CTA"
        scene: "NUAN bottle centered on clean countertop, peach scent badge visible, text overlay fades in: 'Make your cleanup effortless.'"
    cta: "Make your cleanup effortless."
    dedupe_key: "greasy_stovetop_smear_degreaser_fix"

  - script_id: "script_c_002"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Sticky range hood grease that generic sprays cannot remove"
    conflict_hook: "Person sprays generic cleaner on greasy range hood filter, paper towel shreds, grease stays"
    product_solution: "NUAN heavy duty foam clings to grease, breaks it down, one pass wipe reveals clean metal"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Close-up of greasy yellow range hood filter, hand sprays generic cleaner, wipes with paper towel, grease smears, towel shreds, fingers get oily"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "NUAN bottle enters frame, green label visible, nozzle aimed, dense foam sprays onto filter, grease visibly breaking down and turning liquid"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "One pass with cloth wipes filter completely clean, shiny silver metal revealed, dramatic before-after contrast in same frame"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "NUAN sprayed on vertical kitchen backsplash tile with grease splatter, foam clings without dripping, grease runs down with foam as it dissolves"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Wide shot of spotless kitchen counter area, gleaming cookware on stove, bright natural light, person runs hand over clean surface nodding"
      - time: "18-20s"
        purpose: "CTA"
        scene: "NUAN bottle next to a fresh peach on clean counter, text overlay: 'A simple upgrade for everyday use.'"
    cta: "A simple upgrade for everyday use."
    dedupe_key: "range_hood_grease_generic_fail_degreaser"

  - script_id: "script_c_003"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Baked-on oven and microwave grease that requires heavy scrubbing with no result"
    conflict_hook: "Person scrubs oven door vigorously, arm straining, baked-on brown grease spots completely unchanged"
    product_solution: "NUAN degreaser sprayed on baked-on grease, foam clings and softens it, effortless wipe reveals clean glass"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Close-up of oven door with dark baked-on grease spots, person scrubbing hard with sponge, arm muscles tensing, sweat visible, grease unchanged, person exhales in exhaustion"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "NUAN bottle appears, trigger pressed, white foam sprayed directly onto brown grease spots, foam clinging to vertical glass, grease visibly softening and lifting"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Effortless single wipe, oven glass becomes crystal clear, light reflects off clean surface, dramatic transformation"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "NUAN sprayed inside greasy microwave, foam covering food splatter on walls and ceiling, quick wipe reveals spotless white interior"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Air fryer basket wiped clean, all kitchen appliances gleaming, person smiling at the fresh clean kitchen, peach scent implied by fresh atmosphere"
      - time: "18-20s"
        purpose: "CTA"
        scene: "NUAN bottle centered, green label and peach scent badge prominent, text overlay: 'Your spotless kitchen starts here.'"
    cta: "Your spotless kitchen starts here."
    dedupe_key: "baked_on_oven_grease_scrub_degreaser_fix"
