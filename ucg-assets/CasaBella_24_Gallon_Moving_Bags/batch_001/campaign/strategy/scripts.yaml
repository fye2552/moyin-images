scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Flimsy plastic garbage bags tear under moving loads"
    conflict_hook: "Plastic bag handle snaps, clothes spill onto floor"
    product_solution: "Bright blue CasaBella bag slides in with wide wraparound handles, full-zip top, easy loading"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Overstuffed plastic garbage bag handle stretches and snaps, clothes spill out"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "CasaBella blue bag replaces the torn bag, clothes loaded easily through the full-zip opening, sturdy handles visible"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Fully loaded blue bag carried effortlessly by handles down a hallway"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Blue bag in car trunk or camping tent, gear loaded through wide open top"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Bag folded flat on a shelf, white tag pocket visible, compact and organized"
      - time: "18-20s"
        purpose: "CTA"
        scene: "Text overlay: Move smarter. Store simpler."
    cta: "Move smarter. Store simpler."
    dedupe_key: "plastic_bag_tear_handle_snap_clothes_spill_fast_cut"

