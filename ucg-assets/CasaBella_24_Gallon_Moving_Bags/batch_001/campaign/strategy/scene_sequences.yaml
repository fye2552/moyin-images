scene_sequences:
  - sequence_id: "sequence_001"
    total_duration: 20
    structure:
      - time: "0-3s"
        segment: "pain_conflict"
        description: "Plastic garbage bag handle snaps under weight, clothes spill onto bedroom floor"
      - time: "3-6s"
        segment: "product_solution"
        description: "The bright blue CasaBella moving bag slides into frame, wide wraparound handles gripped easily, clothes loaded smoothly through the full-zip top opening"
      - time: "6-10s"
        segment: "fast_cut_scene_1"
        description: "The bag fully loaded, zipped shut, carried effortlessly by the sturdy blue handles down a hallway"
      - time: "10-14s"
        segment: "fast_cut_scene_2"
        description: "Different scene: bag placed in a camping tent or car trunk, gear loaded easily through the wide open top, handles visible"
      - time: "14-18s"
        segment: "fast_cut_scene_3"
        description: "Bag folded flat, stored neatly on a shelf next to other folded bags, white tag pocket visible for labeling"
      - time: "18-20s"
        segment: "cta"
        description: "Short CTA text overlay: 'Move smarter. Store simpler.'"

  - sequence_id: "sequence_002"
    total_duration: 20
    structure:
      - time: "0-3s"
        segment: "pain_conflict"
        description: "Close-up of hands struggling to grip a heavy cardboard box with no handles, fingers slipping, box tilting in a hallway"
      - time: "3-6s"
        segment: "product_solution"
        description: "The blue CasaBella bag replaces the box, sturdy wraparound handles running under the bag for secure grip, easy lifting"
      - time: "6-10s"
        segment: "fast_cut_scene_1"
        description: "Bag carried comfortably with one hand on the handle, walking through a doorway with ease"
      - time: "10-14s"
        segment: "fast_cut_scene_2"
        description: "Bag placed on a laundry room floor, open top, person loading bedding and towels, dual zipper detail visible"
      - time: "14-18s"
        segment: "fast_cut_scene_3"
        description: "Multiple blue CasaBella bags lined up neatly in a storage room, each with its white tag pocket labeled"
      - time: "18-20s"
        segment: "cta"
        description: "Short CTA text overlay: 'A simple upgrade for everyday use.'"

  - sequence_id: "sequence_003"
    total_duration: 20
    structure:
      - time: "0-3s"
        segment: "pain_conflict"
        description: "Person digging through a messy open bin in a closet, pulling out wrong items, frustration visible"
      - time: "3-6s"
        segment: "product_solution"
        description: "The blue CasaBella bag appears, items sorted and placed neatly inside, white tag pocket labeled 'Bedding'"
      - time: "6-10s"
        segment: "fast_cut_scene_1"
        description: "Bag zipped shut, carried easily to a shelf, tag pocket clearly visible"
      - time: "10-14s"
        segment: "fast_cut_scene_2"
        description: "Another bag in use outdoors or on a patio, loading camping gear, waterproof material repelling light moisture"
      - time: "14-18s"
        segment: "fast_cut_scene_3"
        description: "Bags folded flat and stored compactly on a shelf, freeing up closet space, silver interior lining briefly visible"
      - time: "18-20s"
        segment: "cta"
        description: "Short CTA text overlay: 'Your space, simplified.'"
