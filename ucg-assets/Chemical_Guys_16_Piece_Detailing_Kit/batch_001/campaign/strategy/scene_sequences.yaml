scene_sequences:
- sequence_id: sequence_001
  total_duration: 20
  structure:
  - time: 0-3s
    segment: pain_conflict
    description: 'Garden hose washing fails: thin foam breaks on hood, dirt untouched,
      water spots forming'
  - time: 3-6s
    segment: product_solution
    description: TORQ Foam Blaster appears, thick white foam blankets the car, green
      wash mitt glides over smooth paint, dirt lifts instantly
  - time: 6-10s
    segment: fast_cut_scene_1
    description: Clean, glossy hood after rinse, sunlight reflecting off wet paint,
      no water spots, Chemical Guys bucket visible
  - time: 10-14s
    segment: fast_cut_scene_2
    description: Blue microfiber towel gliding over dashboard, interior cleaner spray
      on surface, streak-free shine, clean screen
  - time: 14-18s
    segment: fast_cut_scene_3
    description: Wheel brush with Sticky Citrus cleaner scrubbing a wheel, bright
      clean spokes, tire shine applied with applicator
  - time: 18-20s
    segment: cta
    description: A simple upgrade for everyday use.
