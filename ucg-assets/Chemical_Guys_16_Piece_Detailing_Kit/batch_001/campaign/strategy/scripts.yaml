scripts:
- script_id: script_c_001
  duration: 20
  style: pain_conflict_fast_cut
  pain_point: Weak foam from garden hose leaves dirt and water spots
  conflict_hook: Garden hose washing fails
  product_solution: TORQ Foam Blaster 6 Pro with thick foam and green wash mitt
  timeline:
  - time: 0-3s
    purpose: 痛点冲突
    scene: Garden hose thin foam breaks apart on hood, water spots form in sun
  - time: 3-6s
    purpose: 产品解决
    scene: TORQ Foam Blaster covers car in thick foam, green mitt glides over paint
  - time: 6-10s
    purpose: 快切场景 1
    scene: Glossy clean hood reflecting sunlight, no water spots, bucket visible
  - time: 10-14s
    purpose: 快切场景 2
    scene: Blue microfiber towel cleaning dashboard, streak-free, lint-free
  - time: 14-18s
    purpose: 快切场景 3
    scene: Wheel brush with Sticky Citrus cleaner, tire shine applied
  - time: 18-20s
    purpose: CTA
    scene: A simple upgrade for everyday use.
  cta: A simple upgrade for everyday use.
  dedupe_key: chemical_guys_kit_001
