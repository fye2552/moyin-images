pain_amplifiers:
  - pain_id: "pain_001"
    pain_point: "dry leaves keep spreading back across the driveway and walkway"
    real_life_detail: "leaves are stuck along the driveway edge, around shoes, and near a garage threshold"
    wrong_or_inefficient_behavior: "using a broom takes repeated sweeping strokes and still leaves scattered pieces behind"
    emotional_trigger: "yard cleanup feels slow and repetitive before guests arrive"
    dedupe_key: "driveway_leaves|broom_repeated_sweeping|scattered_pieces|slow_cleanup"
  - pain_id: "pain_002"
    pain_point: "light snow on a car is annoying to clear in cold weather"
    real_life_detail: "powder snow sits on the windshield edge, side mirror, and hood seam"
    wrong_or_inefficient_behavior: "brushing by hand pushes snow into wet clumps and leaves residue near the glass edge"
    emotional_trigger: "standing outside longer in the cold feels frustrating"
    dedupe_key: "light_snow_car|hand_brushing|wet_clumps|cold_frustration"
  - pain_id: "pain_003"
    pain_point: "dust and debris collect in patio and garage corners"
    real_life_detail: "small leaves, ash-like dust, and crumbs sit in a tight corner after outdoor cooking"
    wrong_or_inefficient_behavior: "trying to sweep a corner spreads the debris instead of moving it cleanly"
    emotional_trigger: "small cleanup becomes irritating because the mess keeps escaping the broom"
    dedupe_key: "patio_garage_corner|sweeping_spreads_debris|outdoor_cooking_mess|annoying_cleanup"
