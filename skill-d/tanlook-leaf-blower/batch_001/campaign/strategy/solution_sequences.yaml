solution_sequences:
  - solution_id: "solution_001"
    product_action: "hold the yellow-and-black TANLOOK cordless blower by the top grip, aim the long black tube low along the driveway, and sweep airflow in one controlled pass"
    visible_result: "leaves move into a compact line and the driveway strip looks clean"
    final_shot: "close-up of the clean driveway path with the TANLOOK blower and rear battery pack visible beside the leaf pile"
    product_consistency_rule: "keep the bright yellow body, matte black two-piece tube, tapered nozzle, black honeycomb intake grille, rear 20V MAX battery, and TANLOOK badge exactly based on Skill A reference images"
    dedupe_key: "tanlook_controlled_airflow|dry_leaves_to_pile|clean_driveway_final"
  - solution_id: "solution_002"
    product_action: "hold the TANLOOK blower at a safe angle above the car surface and move the airflow across powdery light snow"
    visible_result: "loose snow lifts and slides away, revealing clear windshield glass and car paint"
    final_shot: "close-up of cleared windshield edge with the yellow-and-black blower tube still pointed away from the glass"
    product_consistency_rule: "keep the bright yellow body, matte black two-piece tube, tapered nozzle, black honeycomb intake grille, rear 20V MAX battery, and TANLOOK badge exactly based on Skill A reference images"
    dedupe_key: "tanlook_light_snow|car_surface_airflow|clear_windshield_final"
  - solution_id: "solution_003"
    product_action: "use the TANLOOK blower in a short low-angle burst to push corner dust, tiny leaves, and barbecue crumbs into one pile"
    visible_result: "the patio corner becomes clean and debris gathers where it can be picked up"
    final_shot: "neat patio corner with the TANLOOK blower held in frame and the debris pile separated at the edge"
    product_consistency_rule: "keep the bright yellow body, matte black two-piece tube, tapered nozzle, black honeycomb intake grille, rear 20V MAX battery, and TANLOOK badge exactly based on Skill A reference images"
    dedupe_key: "tanlook_corner_cleanup|dust_debris_to_pile|clean_patio_final"
