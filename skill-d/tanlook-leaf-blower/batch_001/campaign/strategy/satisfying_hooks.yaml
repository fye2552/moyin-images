satisfying_hooks:
  - hook_id: "satisfying_001"
    result_type: "instant_leaf_clearing"
    opening_scene: "Close-up at driveway level: a tight strip of dry orange leaves is pushed cleanly aside in one strong pass by the TANLOOK cordless blower airflow."
    satisfying_detail: "The concrete changes from covered with crunchy leaves to a clean visible path, with leaves rolling into a neat pile at the edge."
    visual_trigger: "fast leaf movement and clean before-after path"
    product_relevance: "580 CFM / 160 MPH airflow clears dry autumn leaves from driveway and walkway surfaces"
    dedupe_key: "leaf_clearing|driveway_strip|single_airflow_pass|clean_path"
  - hook_id: "satisfying_002"
    result_type: "light_snow_blowoff"
    opening_scene: "Close-up of powdery light snow sliding off a car windshield edge as the TANLOOK blower directs airflow across the glass."
    satisfying_detail: "The white snow layer breaks apart and exposes a clear section of windshield without scraping."
    visual_trigger: "powder snow lifting away from glass"
    product_relevance: "high airflow helps move scattered light snow from cars and outdoor surfaces"
    dedupe_key: "light_snow|car_windshield|airflow_clear|no_scraper"
  - hook_id: "satisfying_003"
    result_type: "debris_cleanup"
    opening_scene: "Low close-up of dust, tiny leaves, and barbecue crumbs being blown out from a patio corner into one visible pile."
    satisfying_detail: "The cluttered corner becomes visibly clear while debris gathers in a controllable line."
    visual_trigger: "small debris rolling out from a tight corner"
    product_relevance: "cordless handheld blower clears dust, debris, and outdoor barbecue mess without dragging a cord"
    dedupe_key: "patio_corner|dust_debris|barbecue_cleanup|controlled_pile"
