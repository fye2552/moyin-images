scripts:
  - script_id: "script_c_002"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "One bulky charger blocks the bedside outlet and forces a phone and earbuds to charge one at a time."
    conflict_hook: "A hand repeatedly swaps one cable while the neighboring wall socket remains blocked."
    product_solution: "Insert the ANRMESUN adapter upright and connect exactly two devices through two confirmed front USB ports."
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "单个笨重充电头挡住床头墙插，手机与耳机盒只能换线轮流充。"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "移除旧充电头，从侧边扶住产品并直立插入，手立刻离开，正面无遮挡。"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "正面清晰展示产品，仅两根线连接手机与耳机盒。"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "同一酒店床头与光线，正面更紧凑地展示万能插孔和四接口布局。"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "稍拉宽但仍以前部为主，产品直立，手机与耳机盒整齐放置。"
      - time: "18-20s"
        purpose: "CTA"
        scene: "保持同一构图自然定格。"
    cta: "One outlet. Two everyday devices."
    dedupe_key: "hotel_wall_outlet|single_blocking_charger|front_facing_adapter|phone_earbuds|two_cables_only"
