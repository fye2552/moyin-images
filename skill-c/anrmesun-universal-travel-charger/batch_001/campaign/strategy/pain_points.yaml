pain_points:
  - pain_point_id: "pain_001"
    pain_point: "A traveler carries several separate chargers but the hotel nightstand has limited usable outlets."
    wrong_behavior: "The traveler repeatedly rearranges bulky charging bricks and tangled cables, with one brick blocking the adjacent socket."
    close_up_detail: "Three charger bricks overlap beside a phone, tablet, and earbuds while one loose cable falls back across the table."
    emotional_trigger: "Packing and charging several devices feels needlessly cluttered and inefficient."
