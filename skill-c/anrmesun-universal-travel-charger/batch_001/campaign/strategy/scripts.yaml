scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Too many separate charger bricks and cables for limited travel outlets."
    conflict_hook: "A bulky charger blocks the adjacent hotel socket while cables slide across a crowded nightstand."
    product_solution: "Replace the separate chargers with one ANRMESUN adapter using its confirmed USB-A and USB-C ports."
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "酒店床头多个充电头和线材挤占有限插座，手反复调整仍被挡住。"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "手将零散充电头移开，拿出并插入ANRMESUN旅行转换插头。"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "手机和耳机分别连接已确认USB接口，桌面明显整洁。"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "机场休息区工作台，同一产品连接手机和小平板。"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "产品从插座取下并放入护照旁的小旅行收纳袋。"
      - time: "18-20s"
        purpose: "CTA"
        scene: "产品在打开的收纳袋中稳定特写。"
    cta: "One adapter. Less charging clutter."
    dedupe_key: "hotel_blocked_socket|charger_clutter|multiport_solution|airport_desk|travel_pouch"
