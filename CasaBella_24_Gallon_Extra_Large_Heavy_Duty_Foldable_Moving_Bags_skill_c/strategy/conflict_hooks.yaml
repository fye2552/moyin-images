conflict_hooks:
  - conflict_id: "conflict_001"
    opening_scene: "A person drags an overflowing black trash bag across a bedroom floor. The bag catches on a door frame corner, fabric rips open, and folded clothes spill across the dusty hallway floor"
    wrong_behavior: "Using weak plastic trash bags for heavy moving loads"
    amplified_detail: "Slow-motion close-up of the thin plastic stretching to transparency at the stress point, then the sudden rip with a jacket sleeve flopping out onto the dirty floor"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_002"
    opening_scene: "A person pushes a loaded hand truck through a narrow apartment corridor. The top box starts tilting, the whole stack sways, and kitchen pans clatter down the stairs in a loud cascade"
    wrong_behavior: "Overloading a dolly with unstable loose boxes for a single trip"
    amplified_detail: "Close-up of a box edge slipping millimeter by millimeter off the stack, the person's eyes widening as they realize it is about to fall"
    conflict_type: "real_life_wrong_behavior"
  - conflict_id: "conflict_003"
    opening_scene: "A tired person sits on the floor of a new apartment surrounded by twenty identical brown cardboard boxes. They cut open a fifth box, pull out winter boots, sigh, push it aside, and reach for a sixth box"
    wrong_behavior: "Moving without labeling or organizing by category"
    amplified_detail: "Close-up of the person's exhausted face in dim light, camera slowly panning across the sea of unlabeled boxes as the realization sinks in that the search could take hours"
    conflict_type: "real_life_wrong_behavior"
