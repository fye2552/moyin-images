scripts:
  - script_id: "script_c_001"
    duration: 20
    style: "pain_conflict_fast_cut"
    pain_point: "Trash bags tear open during moving, spilling clothes and belongings onto dirty floors"
    conflict_hook: "A trash bag catches on a door frame, rips open, and clothes spill across the hallway floor"
    product_solution: "Switch to CasaBella 24-gallon heavy-duty foldable moving bag with wide wraparound handles and dual zippers"
    timeline:
      - time: "0-3s"
        purpose: "痛点冲突"
        scene: "Trash bag ripping open on a door frame corner, clothes spilling across a dusty hallway floor in slow motion"
      - time: "3-6s"
        purpose: "产品解决"
        scene: "Bright blue CasaBella bag enters frame, hands quickly load all spilled items, dual zipper seals shut, person lifts bag easily"
      - time: "6-10s"
        purpose: "快切场景 1"
        scene: "Person walks confidently down a clean hallway carrying the loaded blue bag by its wide wraparound handles, everything secure"
      - time: "10-14s"
        purpose: "快切场景 2"
        scene: "Outdoor camping — blue bag on green grass beside a tent, waterproof surface beading morning dew, camping gear dry inside"
      - time: "14-18s"
        purpose: "快切场景 3"
        scene: "Final organized result — blue bag on a closet shelf, white tag pocket with handwritten label, camera pulls back to show clean tidy storage room"
      - time: "18-20s"
        purpose: "CTA"
        scene: "Bag centered, gentle final pose, text overlay: Make every move cleaner and simpler."
    cta: "Make every move cleaner and simpler."
    dedupe_key: "trash_bag_tear_dolly_topple_unlabeled_boxes"
