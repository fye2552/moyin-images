pain_points:
  - pain_point_id: "pain_001"
    pain_point: "Trash bags tear open during moving, spilling clothes and belongings onto dirty floors"
    wrong_behavior: "Using cheap thin plastic trash bags to haul heavy clothes and household items during a move"
    close_up_detail: "Close-up of a stretched black trash bag seam slowly ripping apart under weight, a sweater sleeve poking through the tear and dragging on the floor"
    emotional_trigger: "Frustration of seeing personal items get dirty or damaged because of inadequate packing supplies"
  - pain_point_id: "pain_002"
    pain_point: "Overloaded carts and dollies cause items to topple and scatter during transport"
    wrong_behavior: "Stacking loose items and small boxes on a hand truck too high, causing them to wobble and crash down in hallways or stairwells"
    close_up_detail: "Close-up of a stack of mismatched boxes on a dolly sliding off sideways in slow motion, books and kitchen items hitting the floor"
    emotional_trigger: "Anxiety and embarrassment of causing noise and damage in shared apartment hallways, and the extra cleanup time"
  - pain_point_id: "pain_003"
    pain_point: "Cannot find specific items across dozens of identical cardboard boxes after moving in"
    wrong_behavior: "Piling unlabeled cardboard boxes in a new room and having to open every single one to find daily essentials"
    close_up_detail: "Close-up of hands frantically cutting tape on box after box, pulling out wrong items, growing more exhausted with each one"
    emotional_trigger: "Exhaustion and helplessness after a long moving day, just wanting to find toiletries and change of clothes but unable to"
